title: jiq
description: Interactive JSON query tool with real-time output
remote_theme: just-the-docs/just-the-docs
url: https://bellicose100xp.github.io
baseurl: /jiq

permalink: pretty

# Just-the-docs configuration
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/bellicose100xp/jiq"
  "Crates.io":
    - "https://crates.io/crates/jiq"

aux_links_new_tab: true

color_scheme: jiq

callouts_level: quiet
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Footer
footer_content: 'Dual-licensed under <a href="https://github.com/bellicose100xp/jiq/blob/main/LICENSE-MIT">MIT</a> OR <a href="https://github.com/bellicose100xp/jiq/blob/main/LICENSE-APACHE">Apache-2.0</a>. <a href="https://github.com/bellicose100xp/jiq">Source on GitHub</a>.'
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/bellicose100xp/jiq"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Build settings
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules

defaults:
  - scope:
      path: ""
    values:
      layout: default
